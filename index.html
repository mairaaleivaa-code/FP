<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FP — Finanzas Personales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1b2a;--card:#1b2838;--card2:#213040;--border:#2a3f55;
  --text:#e2e8f0;--t2:#8899aa;--t3:#5a6f82;
  --teal:#2dd4a8;--teal2:#25b890;--coral:#ff6b8a;--gold:#ffd166;--blue:#5dadec;--purple:#b68eff;--pink:#ff8fab;
  --r:16px;--r2:12px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
.hdr{padding:24px 32px 20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.hdr-left h1{font-size:26px;font-weight:900;letter-spacing:-.5px}
.hdr-left p{font-size:13px;color:var(--t2);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
.month-badge{background:var(--teal);color:#0d1b2a;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700}
.toggle-grp{display:flex;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--border)}
.toggle-grp button{padding:7px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--t2);transition:all .2s}
.toggle-grp button.active{background:var(--card2);color:var(--text)}

/* LAYOUT */
.page{padding:0 32px 60px;max-width:1400px;margin:0 auto}
.row{display:grid;gap:16px;margin-bottom:20px}
.r4{grid-template-columns:repeat(4,1fr)}
.r2{grid-template-columns:3fr 2fr}
.r3{grid-template-columns:repeat(3,1fr)}
.r2eq{grid-template-columns:1fr 1fr}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--t2);margin-bottom:16px}

/* KPI */
.kpi-icon{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t3)}
.kpi-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.ic-up{background:rgba(45,212,168,.08);color:var(--teal)}
.ic-down{background:rgba(255,107,138,.08);color:var(--coral)}
.ic-bal{background:rgba(93,173,236,.08);color:var(--blue)}
.ic-save{background:rgba(182,142,255,.08);color:var(--purple)}
.kpi-label{font-size:13px;color:var(--t2);font-weight:500}
.kpi-val{font-size:28px;font-weight:900;margin-top:6px;letter-spacing:-1px}
.kpi-change{font-size:12px;font-weight:600;margin-top:6px}
.kpi-up{color:var(--teal)}.kpi-down{color:var(--coral)}

/* CATEGORY BARS */
.cat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,63,85,.4)}
.cat-row:last-child{border-bottom:none}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{width:130px;font-size:13px;font-weight:500;flex-shrink:0}
.cat-bar-wrap{flex:1;height:7px;background:rgba(42,63,85,.5);border-radius:4px;overflow:hidden}
.cat-bar{height:100%;border-radius:4px;transition:width .6s}
.cat-vals{text-align:right;min-width:130px;flex-shrink:0}
.cat-amt{font-size:13px;font-weight:700}
.cat-pct{font-size:11px;color:var(--t2);margin-left:8px}

/* CHART */
.chart-box{position:relative;height:180px}

/* INVESTMENTS */
.inv-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.risk-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.risk-low{background:rgba(45,212,168,.12);color:var(--teal);border:1px solid rgba(45,212,168,.25)}
.risk-mid{background:rgba(255,209,102,.12);color:var(--gold);border:1px solid rgba(255,209,102,.25)}
.risk-high{background:rgba(255,107,138,.12);color:var(--coral);border:1px solid rgba(255,107,138,.25)}
.inv-amt{font-size:22px;font-weight:800;margin:10px 0 4px;letter-spacing:-.5px}
.inv-ret{font-size:12px;font-weight:600}

/* GOALS */
.goal-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.goal-icon{font-size:22px;margin-bottom:6px}
.goal-name{font-size:14px;font-weight:700}
.goal-nums{display:flex;justify-content:space-between;font-size:12px;margin:8px 0 4px;color:var(--t2)}
.prog-bg{height:6px;background:rgba(42,63,85,.6);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.goal-info{font-size:11px;color:var(--t2);margin-top:8px;line-height:1.5}

/* INCOME BARS */
.inc-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.inc-name{width:100px;font-size:13px;font-weight:500;flex-shrink:0}
.inc-bar-wrap{flex:1;height:8px;background:rgba(42,63,85,.5);border-radius:4px;overflow:hidden}
.inc-bar{height:100%;border-radius:4px;background:var(--teal)}
.inc-val{font-size:13px;font-weight:700;min-width:90px;text-align:right}

/* SECTION TITLE */
.sec{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* FAB */
.fab-row{position:fixed;bottom:20px;right:32px;display:flex;gap:8px;z-index:50}
.fab{border:none;border-radius:14px;padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:transform .15s;background:var(--card2);color:var(--text);border:1px solid var(--border)}
.fab:active{transform:scale(.95)}
.fab:hover{border-color:var(--teal)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal .close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer}
.input{background:var(--bg);color:var(--text);border:1.5px solid var(--border);border-radius:var(--r2);padding:11px 14px;font-size:14px;width:100%;outline:none;font-family:inherit;font-weight:500}
.input:focus{border-color:var(--teal)}
.input::placeholder{color:var(--t3)}
.form-stack{display:flex;flex-direction:column;gap:10px}
.form-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:2px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{border:none;border-radius:var(--r2);padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn-teal{background:var(--teal);color:#0d1b2a}
.btn-blue{background:var(--blue);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.toggle-row{display:flex;gap:8px;margin-bottom:12px}
.toggle-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--t2);transition:all .2s}
.tg-g{background:rgba(45,212,168,.1);color:var(--teal);border-color:rgba(45,212,168,.3)}
.tg-r{background:rgba(255,107,138,.1);color:var(--coral);border-color:rgba(255,107,138,.3)}
.mode-row{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:12px}
.mode-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--t3)}
.mode-btn.active{background:var(--card2);color:var(--teal)}
.btn-icon{background:none;border:none;color:var(--t3);padding:4px 6px;cursor:pointer;font-size:11px;border-radius:6px;font-family:inherit;font-weight:500;letter-spacing:.5px}
.btn-icon:hover{color:var(--text);background:rgba(255,255,255,.05)}


.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.reg-col h3{font-size:14px;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.reg-table{width:100%;font-size:12px;border-collapse:collapse}
.reg-table th{text-align:left;font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1px solid var(--border)}
.reg-table td{padding:7px 8px;border-bottom:1px solid rgba(42,63,85,.2);font-weight:500}
.reg-table tr:last-child td{border-bottom:none}
.reg-total{font-weight:700;border-top:2px solid var(--border)!important}
.var-pos{color:var(--teal)}.var-neg{color:var(--coral)}
.kpi-est{font-size:11px;color:var(--t3);margin-top:6px}
.kpi-est b{font-weight:700}
.kpi-var{font-size:12px;font-weight:700;margin-top:3px}
@media(max-width:700px){.reg-grid{grid-template-columns:1fr}}

.empty-msg{text-align:center;padding:30px;color:var(--t3);font-size:13px}
.sec-icon{width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;margin-right:6px}
.sec-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.mov-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(42,63,85,.3);font-size:13px}
.mov-item:last-child{border-bottom:none}
.mov-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mov-body{flex:1;min-width:0}
.mov-cat{font-weight:600}
.mov-sub{font-size:11px;color:var(--t3)}
.mov-amt{font-weight:700;font-size:13px;flex-shrink:0}
.mov-acts{display:flex;gap:2px;flex-shrink:0;margin-left:4px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--teal);color:#0d1b2a;padding:10px 24px;border-radius:12px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:900px){
  .r4{grid-template-columns:1fr 1fr}.r2,.r2eq{grid-template-columns:1fr}.r3{grid-template-columns:1fr}
  .hdr{padding:16px}.page{padding:0 16px 80px}
  .cat-name{width:90px;font-size:12px}.cat-vals{min-width:100px}
  .kpi-val{font-size:22px}
  .fab-row{right:16px;bottom:16px}
}
@media(max-width:500px){.r4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<div class="hdr">
  <div class="hdr-left">
    <h1 style="font-size:28px;font-weight:900;letter-spacing:1px">FP</h1>
  </div>
  <div class="hdr-right">
    <div class="month-badge" id="monthBadge"></div>
    <div class="toggle-grp">
      <button class="active" id="btnDash" onclick="setPage('dash')">Dashboard</button>
      <button id="btnReg" onclick="setPage('reg')">Registro</button>
    </div>
    <div class="toggle-grp">
      <button class="active" id="btnCur" onclick="setView(0)">Mes actual</button>
      <button id="btnPrev" onclick="setView(-1)">Mes anterior</button>
    </div>
  </div>
</div>

<div class="page" id="page"></div>

<div class="fab-row">
  <button class="fab" onclick="openModal('mov')">＋ Movimiento</button>
  <button class="fab" onclick="openModal('inv')">＋ Inversión</button>
  <button class="fab" onclick="openModal('meta')">＋ Meta</button>
</div>

<script>
var MO=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var IS=["Mamá","Papá","Musa","Núcleo Sport","Nutrimed","C. Sandwich","Trading","Otros"];
var EC=[
  {n:"Vivienda y servicios",sc:["Alquiler","Luz","Agua","Gas","Internet"],cl:"#2dd4a8"},
  {n:"Mercadería",sc:["Básicos","Verdulería","Carnicería","Pollería","Dietética","Almacén"],cl:"#5dadec"},
  {n:"Transporte",sc:["Remis","Cole","Combustible"],cl:"#ffd166"},
  {n:"Ocio y salidas",sc:["Salidas","Regalos","Gastos hormiga"],cl:"#ff6b8a"},
  {n:"Salud",sc:["Médico","Gym","Medicación"],cl:"#b68eff"},
  {n:"Créditos",sc:["M. Crédito","Naranja","Cuotas"],cl:"#ff8fab"},
  {n:"Educación",sc:["Cursos","Fotocopias","Materiales"],cl:"#4ecdc4"},
  {n:"Estética",sc:["Uñas","Tattoo","Facial","Lifting"],cl:"#f7aef8"},
  {n:"Servicios",sc:["Spotify","Netflix","Apps"],cl:"#74c7ec"},
  {n:"Tecnología",sc:["Celular","Monitor","Cables"],cl:"#89b4fa"},
  {n:"Vestuario",sc:["Ropa","Accesorios","Calzados"],cl:"#fab387"},
  {n:"Inversión",sc:["Aportes"],cl:"#a6e3a1"},
  {n:"Impuestos",sc:["Monotributo"],cl:"#f9e2af"},
  {n:"Emprendimiento",sc:["Musa","Nutrimed","Insumos"],cl:"#cba6f7"},
  {n:"Ahorros",sc:["Reservas","Colchón"],cl:"#94e2d5"}
];
var INST=["Cedears","Acciones","Bonos","Ob. Negociables","FCI","Letras","Caución","Naranja X","MM","Trading","Plazo fijo"];
var RISKS=[{n:"Bajo riesgo",c:"risk-low"},{n:"Riesgo medio",c:"risk-mid"},{n:"Alto riesgo",c:"risk-high"}];
var GI={emergencia:"🛡️",cirugia:"🏥",emprendimiento:"🚀",viaje:"✈️",tech:"💻",auto:"🚗",educacion:"📚",otro:"🎯"};

var S={
  txns:JSON.parse(localStorage.getItem("fp-txns")||"[]"),
  inv:JSON.parse(localStorage.getItem("fp-inv")||"[]"),
  goals:JSON.parse(localStorage.getItem("fp-goals")||"[]"),
  vOff:0,pg:"dash"
};

function setPage(p){S.pg=p;Q("btnDash").classList.toggle("active",p==="dash");Q("btnReg").classList.toggle("active",p==="reg");render()}
var CH={};
var now=new Date();

function fmt(n){return"$ "+new Intl.NumberFormat("es-AR",{maximumFractionDigits:0}).format(n)}
function Q(id){return document.getElementById(id)}
function sv(){localStorage.setItem("fp-txns",JSON.stringify(S.txns));localStorage.setItem("fp-inv",JSON.stringify(S.inv));localStorage.setItem("fp-goals",JSON.stringify(S.goals))}
function toast(m){var t=Q("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2200)}
function kc(){Object.values(CH).forEach(function(c){try{c.destroy()}catch(e){}});CH={}}
Chart.defaults.color="#5a6f82";Chart.defaults.font.family="Inter";

function curM(){var m=now.getMonth()+S.vOff,y=now.getFullYear();while(m<0){m+=12;y--}while(m>11){m-=12;y++}return{m:m,y:y}}
function setView(off){S.vOff=off;Q("btnCur").classList.toggle("active",off===0);Q("btnPrev").classList.toggle("active",off===-1);render()}

function gmt(m,y){return S.txns.filter(function(t){return t.month===m&&t.year===y})}
function gsum(arr,tp){return arr.filter(function(x){return x.type===tp&&x.mode!=="estimado"}).reduce(function(s,x){return s+x.amount},0)}
function ggrp(arr,tp){
  var m={};arr.filter(function(x){return x.type===tp&&x.mode!=="estimado"}).forEach(function(x){m[x.category]=(m[x.category]||0)+x.amount});
  return Object.entries(m).map(function(e){return{name:e[0],value:e[1]}}).sort(function(a,b){return b.value-a.value});
}

function render(){
  kc();
  var c=curM(),t=gmt(c.m,c.y),inc=gsum(t,"ingreso"),exp=gsum(t,"egreso"),bal=inc-exp;
  var sr=inc>0?Math.round((inc-exp)/inc*100):0;

  Q("monthBadge").textContent=MO[c.m]+" "+c.y;

  if(S.pg==="reg") return renderReg(c,t);

  var pm=c.m-1,py=c.y;if(pm<0){pm=11;py--}
  var pt=gmt(pm,py),pInc=gsum(pt,"ingreso"),pExp=gsum(pt,"egreso");
  var incChg=pInc>0?Math.round((inc-pInc)/pInc*100):0;
  var expChg=pExp>0?Math.round((exp-pExp)/pExp*100):0;
  var balChg=(pInc-pExp)!==0?Math.round((bal-(pInc-pExp))/Math.abs(pInc-pExp)*100):0;
  var h="";

  h+='<div class="row r4">';
  h+=kpiCard("Ingresos",inc,incChg,"ic-up",'<svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>');
  h+=kpiCard("Egresos",exp,expChg*-1,"ic-down",'<svg viewBox="0 0 24 24"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>',true);
  h+=kpiCard("Balance neto",bal,balChg,"ic-bal",'<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg>');
  h+='<div class="card"><span class="kpi-icon ic-save"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span><div class="kpi-label">Tasa de ahorro</div><div class="kpi-val">'+sr+'%</div><div class="kpi-change '+(sr>=20?"kpi-up":"kpi-down")+'">'+(sr>=20?"Buen ritmo":"Ajustar gastos")+'</div></div>';
  h+='</div>';

  // Estimated totals for dashboard
  var incEst=t.filter(function(x){return x.type==="ingreso"&&x.mode==="estimado"}).reduce(function(s,x){return s+x.amount},0);
  var expEst=t.filter(function(x){return x.type==="egreso"&&x.mode==="estimado"}).reduce(function(s,x){return s+x.amount},0);
  if(incEst>0||expEst>0){
    var viDash=inc-incEst;var veDash=exp-expEst;
    h+='<div class="row" style="grid-template-columns:1fr 1fr;margin-bottom:16px">';
    h+='<div class="card" style="padding:14px 18px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--t2)">Ingresos estimados</span><span style="font-size:14px;font-weight:700">'+fmt(incEst)+'</span></div>';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px"><span style="font-size:12px;color:var(--t2)">Variación</span><span style="font-size:14px;font-weight:700" class="'+(viDash>=0?"var-pos":"var-neg")+'">'+(viDash>=0?"+":"")+fmt(viDash)+'</span></div></div>';
    h+='<div class="card" style="padding:14px 18px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--t2)">Egresos estimados</span><span style="font-size:14px;font-weight:700">'+fmt(expEst)+'</span></div>';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px"><span style="font-size:12px;color:var(--t2)">Variación</span><span style="font-size:14px;font-weight:700" class="'+(veDash>0?"var-neg":"var-pos")+'">'+(veDash>0?"+":"")+fmt(veDash)+'</span></div></div>';
    h+='</div>';
  }

  var catData=ggrp(t,"egreso");
  var incData=ggrp(t,"ingreso");
  h+='<div class="row r3">';

  h+='<div class="card"><div class="card-title"><span class="sec-icon" style="background:rgba(45,212,168,.08);color:var(--teal)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>Gastos por categoría</div>';
  if(catData.length===0) h+='<div class="empty-msg">Sin egresos</div>';
  else{var mx=catData[0].value;catData.slice(0,6).forEach(function(cd){var pct=exp>0?Math.round(cd.value/exp*100):0;var ec=EC.find(function(e){return e.n===cd.name});var cl=ec?ec.cl:"#5dadec";h+='<div class="cat-row"><div class="cat-dot" style="background:'+cl+'"></div><div class="cat-name">'+cd.name+'</div><div class="cat-bar-wrap"><div class="cat-bar" style="width:'+Math.round(cd.value/mx*100)+'%;background:'+cl+'"></div></div><div class="cat-vals"><span class="cat-amt">'+fmt(cd.value)+'</span><span class="cat-pct">'+pct+'%</span></div></div>';})}
  h+='</div>';

  h+='<div class="card"><div class="card-title"><span class="sec-icon" style="background:rgba(45,212,168,.08);color:var(--teal)"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>Ingresos por fuente</div>';
  if(incData.length===0) h+='<div class="empty-msg">Sin ingresos</div>';
  else{var mi=incData[0].value;incData.forEach(function(d){h+='<div class="inc-row"><div class="inc-name">'+d.name+'</div><div class="inc-bar-wrap"><div class="inc-bar" style="width:'+Math.round(d.value/mi*100)+'%"></div></div><div class="inc-val">'+fmt(d.value)+'</div></div>';})}
  h+='</div>';

  h+='<div class="card"><div class="card-title"><span class="sec-icon" style="background:rgba(93,173,236,.08);color:var(--blue)"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></span>Comparación</div><div class="chart-box"><canvas id="chTrend"></canvas></div></div>';
  h+='</div>';

  h+='<div class="sec"><span class="sec-icon" style="background:rgba(93,173,236,.08);color:var(--blue)"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></span>Inversiones</div>';
  if(S.inv.length===0) h+='<div class="card" style="margin-bottom:20px"><div class="empty-msg">Sin inversiones</div></div>';
  else{var ti=S.inv.reduce(function(s,i){return s+i.amount},0);h+='<div class="card-sub" style="margin-bottom:12px">Total: <b style="color:var(--text)">'+fmt(ti)+'</b></div><div class="row r3" style="margin-bottom:20px">';S.inv.forEach(function(inv){var ri=inv.risk||0;var rk=RISKS[ri]||RISKS[0];h+='<div class="inv-card"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:700">'+inv.instrument+'</div><span class="risk-badge '+rk.c+'">'+rk.n+'</span></div><div class="inv-amt">'+fmt(inv.amount)+'</div><div class="inv-ret" style="color:var(--teal)">+'+(inv.returnPct||0)+'% anual</div>'+(inv.broker?'<div style="font-size:11px;color:var(--t3);margin-top:4px">'+inv.broker+'</div>':'')+'<div style="display:flex;gap:2px;margin-top:6px;justify-content:flex-end"><button class="btn-icon" onclick="editInv(\''+inv.id+'\')">editar</button><button class="btn-icon" onclick="delInv(\''+inv.id+'\')">\u00d7</button></div></div>';});h+='</div>';}

  h+='<div class="sec"><span class="sec-icon" style="background:rgba(182,142,255,.08);color:var(--purple)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span>Metas</div>';
  if(S.goals.length===0) h+='<div class="card" style="margin-bottom:20px"><div class="empty-msg">Sin metas</div></div>';
  else{h+='<div class="row r2eq">';S.goals.forEach(function(g){var p=Math.min(100,Math.round(g.saved/g.target*100));var rm=Math.max(0,g.target-g.saved);var mo=g.monthly||0;var ml=mo>0?Math.ceil(rm/mo):0;var pc=p>=100?"var(--teal)":p>60?"var(--blue)":"var(--gold)";h+='<div class="goal-card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="goal-name">'+(GI[g.icon]||"\u25ce")+' '+g.name+'</div>'+(g.where?'<div style="font-size:11px;color:var(--t3);margin-top:2px">Ubicada en: '+g.where+'</div>':'')+'</div><div style="display:flex;gap:2px"><button class="btn-icon" onclick="editGoal(\''+g.id+'\')">editar</button><button class="btn-icon" onclick="delGoal(\''+g.id+'\')">\u00d7</button></div></div><div class="goal-nums"><span>'+fmt(g.saved)+' / '+fmt(g.target)+'</span><span style="color:'+pc+';font-weight:700">'+p+'%</span></div><div class="prog-bg"><div class="prog-fill" style="width:'+p+'%;background:'+pc+'"></div></div><div class="goal-info">';if(mo>0){h+='Aporte: <b style="color:var(--text)">'+fmt(mo)+'/mes</b> · ';if(rm>0)h+='Falta '+fmt(rm)+' · <b style="color:var(--teal)">'+ml+(ml===1?' mes':' meses')+'</b>';else h+='<b style="color:var(--teal)">Meta alcanzada</b>';}else{h+='Falta: '+fmt(rm);}h+='</div><div style="display:flex;gap:6px;margin-top:10px"><input type="number" inputmode="numeric" class="input" style="flex:1;padding:8px 10px;font-size:12px" placeholder="Sumar..." id="ga_'+g.id+'"><button style="background:var(--card);color:var(--teal);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:12px;font-family:inherit" onclick="addToGoal(\''+g.id+'\')">+</button></div></div>';});h+='</div>';}

  Q("page").innerHTML=h;
  initCharts(c);
}

function renderReg(c,t){
  // Group by category, compare est vs real
  function grpEstReal(arr,tp){
    var cats={};
    arr.filter(function(x){return x.type===tp}).forEach(function(x){
      var key=x.category+(x.subcategory?" - "+x.subcategory:"")+(x.description?" - "+x.description:"");
      if(!cats[key])cats[key]={name:x.category,sub:x.subcategory||"",desc:x.description||"",est:0,real:0};
      if(x.mode==="estimado")cats[key].est+=x.amount;else cats[key].real+=x.amount;
    });
    return Object.values(cats).sort(function(a,b){return(b.est+b.real)-(a.est+a.real)});
  }
  var ingRows=grpEstReal(t,"ingreso");
  var egRows=grpEstReal(t,"egreso");
  var totIngEst=ingRows.reduce(function(s,r){return s+r.est},0);
  var totIngReal=ingRows.reduce(function(s,r){return s+r.real},0);
  var totEgEst=egRows.reduce(function(s,r){return s+r.est},0);
  var totEgReal=egRows.reduce(function(s,r){return s+r.real},0);

  var h='<div class="sec" style="margin-bottom:16px"><span class="sec-icon" style="background:rgba(255,209,102,.08);color:var(--gold)"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>Registro '+MO[c.m]+' '+c.y+'</div>';
  h+='<div class="reg-grid">';

  // INGRESOS column
  h+='<div class="card reg-col"><h3 style="color:var(--teal)">INGRESOS</h3>';
  h+='<table class="reg-table"><thead><tr><th>Categoría</th><th style="text-align:right">Estim.</th><th style="text-align:right">Real</th><th style="text-align:right">Var.</th></tr></thead><tbody>';
  if(ingRows.length===0) h+='<tr><td colspan="4" style="text-align:center;color:var(--t3);padding:20px">Sin ingresos</td></tr>';
  else{ingRows.forEach(function(r){
    var v=r.real-r.est;var vc=v>=0?"var-pos":"var-neg";var vs=v>=0?"+":"";
    h+='<tr><td>'+r.name+(r.desc?' <span style="color:var(--t3)">'+r.desc+'</span>':'')+'</td>';
    h+='<td style="text-align:right;color:var(--t3)">'+fmt(r.est)+'</td>';
    h+='<td style="text-align:right;font-weight:700">'+fmt(r.real)+'</td>';
    h+='<td style="text-align:right" class="'+(r.est>0?vc:"")+'">'+(r.est>0?vs+fmt(v):"—")+'</td></tr>';
  });}
  var vi=totIngReal-totIngEst;var vic=vi>=0?"var-pos":"var-neg";
  h+='<tr class="reg-total"><td>Total</td><td style="text-align:right;color:var(--t3)">'+fmt(totIngEst)+'</td><td style="text-align:right">'+fmt(totIngReal)+'</td>';
  h+='<td style="text-align:right" class="'+vic+'">'+(vi>=0?"+":"")+fmt(vi)+'</td></tr>';
  h+='</tbody></table></div>';

  // EGRESOS column
  h+='<div class="card reg-col"><h3 style="color:var(--coral)">EGRESOS</h3>';
  h+='<table class="reg-table"><thead><tr><th>Categoría</th><th>Descripción</th><th style="text-align:right">Estim.</th><th style="text-align:right">Real</th><th style="text-align:right">Var.</th></tr></thead><tbody>';
  if(egRows.length===0) h+='<tr><td colspan="5" style="text-align:center;color:var(--t3);padding:20px">Sin egresos</td></tr>';
  else{egRows.forEach(function(r){
    var v=r.real-r.est;var vc=v>0?"var-neg":"var-pos";var vs=v>0?"+":"";
    h+='<tr><td>'+r.name+'</td><td style="color:var(--t3)">'+(r.sub||r.desc||"")+'</td>';
    h+='<td style="text-align:right;color:var(--t3)">'+fmt(r.est)+'</td>';
    h+='<td style="text-align:right;font-weight:700">'+fmt(r.real)+'</td>';
    h+='<td style="text-align:right" class="'+(r.est>0?vc:"")+'">'+(r.est>0?vs+fmt(v):"—")+'</td></tr>';
  });}
  var ve=totEgReal-totEgEst;var vec=ve>0?"var-neg":"var-pos";
  h+='<tr class="reg-total"><td colspan="2">Total</td><td style="text-align:right;color:var(--t3)">'+fmt(totEgEst)+'</td><td style="text-align:right">'+fmt(totEgReal)+'</td>';
  h+='<td style="text-align:right" class="'+vec+'">'+(ve>0?"+":"")+fmt(ve)+'</td></tr>';
  h+='</tbody></table></div>';

  h+='</div>';
  Q("page").innerHTML=h;
}


function kpiCard(label,val,chg,iconCls,iconSvg,invertColor){
  var isUp=invertColor?chg<0:chg>0;
  var arrow=chg>0?"↑":chg<0?"↓":"→";
  var cls=isUp?"kpi-up":"kpi-down";
  if(chg===0) cls="";
  return '<div class="card"><span class="kpi-icon '+iconCls+'">'+iconSvg+'</span><div class="kpi-label">'+label+'</div><div class="kpi-val">'+fmt(val)+'</div><div class="kpi-change '+cls+'">'+arrow+Math.abs(chg)+'% vs mes ant.</div></div>';
}

function initCharts(c){
  var labels=[],dInc=[],dExp=[];
  for(var i=4;i>=0;i--){
    var m=c.m-i,y=c.y;while(m<0){m+=12;y--}
    var t=gmt(m,y);
    labels.push(MO[m].slice(0,3));
    dInc.push(gsum(t,"ingreso"));
    dExp.push(gsum(t,"egreso"));
  }
  var el=Q("chTrend");
  if(el){
    CH.tr=new Chart(el,{type:"bar",data:{labels:labels,datasets:[
      {label:"Ingresos",data:dInc,backgroundColor:"#2dd4a8",borderRadius:6,borderSkipped:false},
      {label:"Egresos",data:dExp,backgroundColor:"#ff6b8a",borderRadius:6,borderSkipped:false}
    ]},options:{responsive:true,maintainAspectRatio:false,scales:{
      x:{ticks:{font:{size:12,weight:"600"}},grid:{display:false}},
      y:{ticks:{font:{size:11},callback:function(v){return(v/1000).toFixed(0)+"k"}},grid:{color:"rgba(42,63,85,.3)"}}
    },plugins:{legend:{labels:{font:{size:12},usePointStyle:true,pointStyle:"circle",padding:16}},
      tooltip:{backgroundColor:"#1b2838",titleFont:{family:"Inter",weight:"700"},bodyFont:{family:"Inter"},padding:14,cornerRadius:10,borderColor:"#2a3f55",borderWidth:1,callbacks:{label:function(c){return c.dataset.label+": "+fmt(c.raw)}}}
    }}});
  }
}

// ===== MODALS =====
var modalType=null,editId=null,formData={};

function openModal(type,id){
  modalType=type;editId=id||null;formData={};
  if(type==="mov"){
    if(id){var t=S.txns.find(function(x){return x.id===id});if(t)formData=Object.assign({},t)}
    else formData={type:"egreso",mode:"real",category:"",subcategory:"",description:"",amount:"",date:""}
  }else if(type==="inv"){
    if(id){var inv=S.inv.find(function(x){return x.id===id});if(inv)formData=Object.assign({},inv)}
    else formData={instrument:"",broker:"",amount:"",date:"",notes:"",risk:0,returnPct:""}
  }else if(type==="meta"){
    if(id){var g=S.goals.find(function(x){return x.id===id});if(g)formData=Object.assign({},g)}
    else formData={name:"",target:"",saved:0,monthly:"",icon:"otro",deadline:"",notes:""}
  }
  renderModal();
}
function closeModal(){Q("modalRoot").innerHTML="";modalType=null;editId=null}

function renderModal(){
  var h='<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">';
  if(modalType==="mov") h+=renderMovModal();
  else if(modalType==="inv") h+=renderInvModal();
  else if(modalType==="meta") h+=renderMetaModal();
  h+='</div></div>';
  Q("modalRoot").innerHTML=h;
}

function renderMovModal(){
  var f=formData,cats=f.type==="ingreso"?IS:EC;
  var selCat=EC.find(function(c){return c.n===f.category});
  var h='<h2>'+(editId?"Editar":"Nuevo")+' movimiento<button class="close" onclick="closeModal()">✕</button></h2>';
  h+='<div class="toggle-row"><button class="toggle-btn '+(f.type==="ingreso"?"tg-g":"")+'" onclick="formData.type=\'ingreso\';formData.category=\'\';renderModal()">▲ Ingreso</button>';
  h+='<button class="toggle-btn '+(f.type==="egreso"?"tg-r":"")+'" onclick="formData.type=\'egreso\';formData.category=\'\';renderModal()">▼ Egreso</button></div>';
  h+='<div class="mode-row"><button class="mode-btn '+(f.mode==="real"?"active":"")+'" onclick="formData.mode=\'real\';renderModal()">💰 Real</button>';
  h+='<button class="mode-btn '+(f.mode==="estimado"?"active":"")+'" onclick="formData.mode=\'estimado\';renderModal()">📋 Estimado</button></div>';
  h+='<div class="form-stack">';
  h+='<select id="mCat" class="input" onchange="formData.category=this.value;formData.subcategory=\'\';renderModal()"><option value="">Categoría...</option>';
  if(f.type==="ingreso"){cats.forEach(function(c){h+='<option value="'+c+'" '+(f.category===c?"selected":"")+'>'+c+'</option>'})}
  else{cats.forEach(function(c){h+='<option value="'+c.n+'" '+(f.category===c.n?"selected":"")+'>'+c.n+'</option>'})}
  h+='</select>';
  if(f.type==="egreso"&&selCat){
    h+='<select id="mSub" class="input"><option value="">Subcategoría...</option>';
    selCat.sc.forEach(function(s){h+='<option value="'+s+'" '+(f.subcategory===s?"selected":"")+'>'+s+'</option>'});
    h+='</select>';
  }
  h+='<input id="mDesc" class="input" placeholder="Descripción (opcional)" value="'+(f.description||"")+'">';
  h+='<input id="mAmt" class="input" type="number" inputmode="numeric" placeholder="Monto" value="'+(f.amount||"")+'">';
  h+='<input id="mDate" class="input" type="date" value="'+(f.date||"")+'">';
  h+='<button class="btn btn-teal" onclick="saveMov()">'+(editId?"Guardar":"Registrar")+'</button></div>';
  return h;
}

function renderInvModal(){
  var f=formData;
  var h='<h2>'+(editId?"Editar":"Nueva")+' inversión<button class="close" onclick="closeModal()">✕</button></h2>';
  h+='<div class="form-stack">';
  h+='<select id="iInst" class="input"><option value="">Instrumento...</option>';
  INST.forEach(function(i){h+='<option value="'+i+'" '+(f.instrument===i?"selected":"")+'>'+i+'</option>'});
  h+='</select>';
  h+='<input id="iBrk" class="input" placeholder="Broker / Plataforma" value="'+(f.broker||"")+'">';
  h+='<div class="form-row"><input id="iAmt" class="input" type="number" inputmode="numeric" placeholder="Monto invertido" value="'+(f.amount||"")+'">';
  h+='<input id="iRet" class="input" type="number" placeholder="Rendimiento % anual" value="'+(f.returnPct||"")+'"></div>';
  h+='<div class="form-label">Nivel de riesgo</div>';
  h+='<div class="toggle-row">';
  RISKS.forEach(function(r,i){h+='<button class="toggle-btn '+((f.risk||0)===i?r.c:"")+'" onclick="formData.risk='+i+';renderModal()">'+r.n+'</button>'});
  h+='</div>';
  h+='<input id="iDate" class="input" type="date" value="'+(f.date||"")+'">';
  h+='<input id="iNotes" class="input" placeholder="Notas (ticker, plazo...)" value="'+(f.notes||"")+'">';
  h+='<button class="btn btn-blue" onclick="saveInv()">'+(editId?"Guardar":"Registrar")+'</button></div>';
  return h;
}

function renderMetaModal(){
  var f=formData;
  var h='<h2>'+(editId?"Editar":"Nueva")+' meta<button class="close" onclick="closeModal()">✕</button></h2>';
  h+='<div class="form-stack">';
  h+='<input id="gN" class="input" placeholder="Nombre de la meta" value="'+(f.name||"")+'">';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
  Object.keys(GI).forEach(function(k){h+='<button style="background:'+(f.icon===k?"rgba(45,212,168,.15)":"var(--bg)")+';border:2px solid '+(f.icon===k?"var(--teal)":"transparent")+';border-radius:10px;padding:8px 10px;font-size:18px;cursor:pointer" onclick="formData.icon=\''+k+'\';renderModal()">'+GI[k]+'</button>'});
  h+='</div>';
  h+='<div class="form-row"><input id="gT" class="input" type="number" inputmode="numeric" placeholder="Monto objetivo" value="'+(f.target||"")+'">';
  h+='<input id="gS" class="input" type="number" inputmode="numeric" placeholder="Ya ahorrado" value="'+(f.saved||"0")+'"></div>';
  h+='<input id="gM" class="input" type="number" inputmode="numeric" placeholder="Aporte mensual estimado" value="'+(f.monthly||"")+'">';
  h+='<input id="gW" class="input" placeholder="Dónde está la plata (ej: Naranja X, Plazo fijo...)" value="'+(f.where||"")+'">';
  h+='<input id="gDl" class="input" type="date" value="'+(f.deadline||"")+'">';
  h+='<input id="gNo" class="input" placeholder="Notas" value="'+(f.notes||"")+'">';
  h+='<button class="btn btn-purple" onclick="saveGoal()">'+(editId?"Guardar":"Crear meta")+'</button></div>';
  return h;
}

// ===== SAVE FUNCTIONS =====
function saveMov(){
  var cat=Q("mCat").value,amt=parseFloat(Q("mAmt").value);
  if(!cat||!amt)return toast("Completá categoría y monto");
  var subEl=Q("mSub");
  var c=curM();
  var e={type:formData.type,mode:formData.mode,category:cat,subcategory:subEl?subEl.value:"",description:Q("mDesc").value,amount:amt,date:Q("mDate").value,month:c.m,year:c.y,id:editId||Date.now().toString()};
  if(editId){S.txns=S.txns.map(function(t){return t.id===editId?e:t})}else{S.txns.push(e)}
  sv();closeModal();toast("Movimiento registrado ✓");render();
}
function saveInv(){
  var inst=Q("iInst").value,amt=parseFloat(Q("iAmt").value);
  if(!inst||!amt)return toast("Completá instrumento y monto");
  var e={instrument:inst,broker:Q("iBrk").value,amount:amt,date:Q("iDate").value,notes:Q("iNotes").value,risk:formData.risk||0,returnPct:parseFloat(Q("iRet").value)||0,id:editId||Date.now().toString()};
  if(editId){S.inv=S.inv.map(function(i){return i.id===editId?e:i})}else{S.inv.push(e)}
  sv();closeModal();toast("Inversión registrada ✓");render();
}
function saveGoal(){
  var name=Q("gN").value,target=parseFloat(Q("gT").value);
  if(!name||!target)return toast("Completá nombre y monto");
  var e={name:name,target:target,saved:parseFloat(Q("gS").value)||0,monthly:parseFloat(Q("gM").value)||0,icon:formData.icon||"otro",where:Q("gW").value,deadline:Q("gDl").value,notes:Q("gNo").value,id:editId||Date.now().toString()};
  if(editId){S.goals=S.goals.map(function(g){return g.id===editId?e:g})}else{S.goals.push(e)}
  sv();closeModal();toast("Meta guardada ✓");render();
}

function editInv(id){openModal("inv",id)}
function delMov(id){if(!confirm("¿Eliminar movimiento?"))return;S.txns=S.txns.filter(function(t){return t.id!==id});sv();toast("Eliminado");render()}
function delInv(id){if(!confirm("¿Eliminar inversión?"))return;S.inv=S.inv.filter(function(i){return i.id!==id});sv();toast("Eliminada");render()}
function editGoal(id){openModal("meta",id)}
function delGoal(id){if(!confirm("¿Eliminar meta?"))return;S.goals=S.goals.filter(function(g){return g.id!==id});sv();toast("Eliminada");render()}
function addToGoal(id){
  var el=Q("ga_"+id);var amt=parseFloat(el?el.value:0);if(!amt)return;
  S.goals=S.goals.map(function(g){return g.id===id?Object.assign({},g,{saved:g.saved+amt}):g});
  sv();toast("Ahorro sumado ✓");render();
}

// Migrate old data
S.txns=S.txns.map(function(t){return t.mode?t:Object.assign({},t,{mode:"real"})});
S.inv=S.inv.map(function(i){return i.risk!==undefined?i:Object.assign({},i,{risk:0,returnPct:0})});
S.goals=S.goals.map(function(g){return g.monthly!==undefined?g:Object.assign({},g,{monthly:0})});
sv();

render();
</script>
