<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP — Finanzas Personales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080f;--card:#24243d;--border:#3a3a58;--border2:#4a4a65;--text:#f0f0f5;--text2:#b0b0c8;--text3:#7a7a95;--lime:#cbff49;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--r:16px;--r2:12px;--shadow:0 4px 20px rgba(0,0,0,.3)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.header{background:var(--card);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{background:var(--lime);color:#000;font-weight:900;font-size:13px;letter-spacing:1px;padding:8px 12px;border-radius:10px}
.logo-text{font-size:12px;color:var(--text3)}
.header-r{display:flex;align-items:center;gap:8px}
.sel{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:500;outline:none;font-family:inherit;cursor:pointer;min-width:70px}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px}
.tab{background:none;border:none;color:var(--text3);font-size:12px;font-weight:600;padding:8px 16px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.tab.active{background:var(--card);color:var(--lime)}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);justify-content:space-around;padding:6px 0 max(14px,env(safe-area-inset-bottom));z-index:50}
.mob-btn{background:none;border:none;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:9px;font-family:inherit;padding:4px 6px;font-weight:500}
.mob-btn.active{color:var(--lime)}
.mob-btn svg{width:20px;height:20px}
.content{padding:20px 24px 24px;max-width:1400px;margin:0 auto}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.card{background:var(--card);border-radius:var(--r);padding:20px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.25)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--bg);color:var(--lime)}
.card-flush{padding:0;overflow:hidden}
.hero{padding:28px 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px}
.hero-grid{display:grid;grid-template-columns:1fr auto auto;gap:32px;align-items:center}
.hero .label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.hero .amount{font-size:38px;font-weight:900;letter-spacing:-1.5px;margin-top:4px}
.hero-stat{text-align:center;padding:0 24px;border-left:1px solid var(--border)}
.hero-stat .val{font-size:20px;font-weight:800;margin-top:4px}
.hero-est{font-size:12px;color:var(--text3);margin-top:10px;display:flex;gap:20px}
.mini{text-align:center;padding:16px 12px;cursor:pointer;transition:transform .15s}
.mini:active{transform:scale(.97)}
.mini-icon{font-size:22px;margin-bottom:6px}
.mini-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mini-val{font-size:18px;font-weight:800;margin-top:3px}
.kpi{text-align:center;padding:16px 10px}
.kpi-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:24px;font-weight:900;margin-top:4px}
.comp-legend{display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--text3)}
.comp-dot{width:8px;height:8px;border-radius:4px;display:inline-block;margin-right:5px}
.comp-row{padding:8px 0;border-bottom:1px solid var(--border)}
.comp-row:last-child{border-bottom:none}
.comp-label{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text2)}
.comp-bar{height:5px;border-radius:3px;margin-bottom:3px}
.comp-bar-est{background:var(--border2)}
.comp-bar-real{background:var(--lime)}
.comp-vals{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:2px}
.chart-wrap{position:relative;width:100%;max-height:200px}
.chart-sm{max-width:140px;max-height:140px;margin:0 auto}
.leg-item{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.leg-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.leg-name{color:var(--text2);font-weight:500}
.leg-val{font-weight:700}
.txn{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border)}
.txn:last-child{border-bottom:none}
.txn-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.dot-in{background:rgba(74,222,128,.12)}
.dot-out{background:rgba(248,113,113,.12)}
.dot-est{background:rgba(203,255,73,.1)}
.txn-body{flex:1;min-width:0}
.txn-cat{font-weight:600;font-size:13px}
.txn-desc{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-right{text-align:right;flex-shrink:0}
.txn-amt{font-weight:700;font-size:14px}
.badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;display:inline-block;margin-top:2px;letter-spacing:.5px}
.b-est{background:rgba(203,255,73,.12);color:var(--lime)}
.b-real{background:rgba(74,222,128,.12);color:var(--green)}
.txn-acts{display:flex;gap:2px}
.btn-i{background:none;border:none;color:var(--text3);padding:6px;cursor:pointer;font-size:14px;border-radius:8px}
.btn-i:hover{background:var(--bg)}
.prog-bg{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.pg-lime{background:linear-gradient(90deg,#a8e600,#cbff49)}
.pg-green{background:linear-gradient(90deg,#10b981,#4ade80)}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sec-title{font-size:22px;font-weight:800}
.btn{border:none;border-radius:var(--r2);padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-lime{background:var(--lime);color:#000}
.btn-dark{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-w{width:100%}
.btn-sm{padding:8px 14px;font-size:12px}
.input{background:var(--bg);color:var(--text);border:1.5px solid var(--border);border-radius:var(--r2);padding:11px 14px;font-size:14px;width:100%;outline:none;font-family:inherit;font-weight:500}
.input:focus{border-color:var(--lime)}
.input::placeholder{color:var(--text3)}
.form-stack{display:flex;flex-direction:column;gap:10px}
.toggle-row{display:flex;gap:8px;margin-bottom:10px}
.toggle-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--text3)}
.tg-g{background:rgba(74,222,128,.12);color:var(--green);border-color:rgba(74,222,128,.3)}
.tg-r{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.3)}
.mode-row{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:12px}
.mode-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--text3)}
.mode-btn.active{background:var(--card);color:var(--lime);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.icon-picker{display:flex;gap:6px;flex-wrap:wrap}
.icon-btn{background:var(--bg);border:2px solid transparent;border-radius:10px;padding:8px 10px;font-size:18px;cursor:pointer}
.icon-btn.active{border-color:var(--lime);background:rgba(203,255,73,.08)}
.goal-add{display:flex;gap:8px;margin-top:12px}
.goal-add .input{flex:1;padding:9px 12px;font-size:13px}
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--lime);color:#000;padding:10px 24px;border-radius:12px;font-size:13px;font-weight:700;z-index:100;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:900px){
  .g3,.g2{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}
  .hero-grid{grid-template-columns:1fr;text-align:center;gap:16px}
  .hero-stat{border-left:none;border-top:1px solid var(--border);padding:16px 0 0}
  .hero-est{justify-content:center}
  .tabs{display:none}.mob-nav{display:flex}
  .content{padding:16px 14px 90px}.header{padding:12px 14px}
}
@media(min-width:901px){.mob-nav{display:none!important}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
  <div class="logo"><div class="logo-mark">FP</div><div class="logo-text">Finanzas Personales</div></div>
  <div class="tabs" id="dtabs">
    <button class="tab active" data-tab="dash" onclick="go('dash')">Dashboard</button>
    <button class="tab" data-tab="mov" onclick="go('mov')">Movimientos</button>
    <button class="tab" data-tab="ana" onclick="go('ana')">Análisis</button>
    <button class="tab" data-tab="inv" onclick="go('inv')">Inversiones</button>
    <button class="tab" data-tab="met" onclick="go('met')">Metas</button>
  </div>
  <div class="header-r">
    <select id="selM" class="sel" onchange="onMC()"></select>
    <select id="selY" class="sel" onchange="onMC()"><option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option><option value="2028">2028</option></select>
  </div>
</div>
<nav class="mob-nav">
  <button class="mob-btn active" data-tab="dash" onclick="go('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio</button>
  <button class="mob-btn" data-tab="mov" onclick="go('mov')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>Mov</button>
  <button class="mob-btn" data-tab="ana" onclick="go('ana')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>Análisis</button>
  <button class="mob-btn" data-tab="inv" onclick="go('inv')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>Inv</button>
  <button class="mob-btn" data-tab="met" onclick="go('met')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Metas</button>
</nav>
<div class="content" id="content"></div>
<script>
var MO=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var IS=["Mamá","Papá","Musa","Núcleo Sport","Nutrimed","C. Sandwich","Trading","Otros"];
var EC=[{n:"Vivienda",s:"Alquiler, Luz, Agua, Gas, Internet"},{n:"Créditos",s:"M. Crédito, Naranja, Cuotas"},{n:"Mercadería",s:"Básicos, Pollería, Verdulería, Dietética"},{n:"Transporte",s:"Remis, Cole, Combustible"},{n:"Salud",s:"Médico, Gym, Medicación"},{n:"Educación",s:"Cursos, Fotocopias, Materiales"},{n:"Estética",s:"Uñas, Tattoo, Facial, Lifting"},{n:"Servicios",s:"Spotify, Netflix, Apps"},{n:"Tecnología",s:"Celular, Monitor, Cables"},{n:"Vestuario",s:"Ropa, Accesorios, Calzados"},{n:"Ocio",s:"Salidas, Regalos, Gastos hormiga"},{n:"Inversión",s:"Aportes a inversiones"},{n:"Impuestos",s:"Monotributo"},{n:"Emprendimiento",s:"Musa, Nutrimed, Insumos"},{n:"Ahorros",s:"Reservas, Colchón"}];
var INST=["Cedears","Acciones","Bonos","Ob. Negociables","FCI","Letras","Caución","Monotrib","Naranja X","MM","Trading"];
var CL=["#cbff49","#60a5fa","#f87171","#fbbf24","#a78bfa","#fb7185","#2dd4bf","#fb923c","#38bdf8","#a3e635","#f43f5e","#c084fc"];
var IC=["#4ade80","#60a5fa","#fbbf24","#a78bfa","#fb7185"];
var GI={emergencia:"🛡️",cirugia:"🏥",emprendimiento:"🚀",viaje:"✈️",tech:"💻",auto:"🚗",educacion:"📚",otro:"🎯"};

var S={tab:"dash",txns:JSON.parse(localStorage.getItem("fp-txns")||"[]"),inv:JSON.parse(localStorage.getItem("fp-inv")||"[]"),goals:JSON.parse(localStorage.getItem("fp-goals")||"[]"),mo:new Date().getMonth(),yr:new Date().getFullYear(),sf:false,eid:null,_f:{type:"egreso",mode:"real",category:"",description:"",amount:"",date:""},_fg:{icon:"otro"}};
var CH={};
var cTT={backgroundColor:"#1a1a38",titleFont:{family:"Inter",weight:"600"},bodyFont:{family:"Inter"},padding:12,cornerRadius:10,borderColor:"#232345",borderWidth:1};

function fmt(n){return new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n)}
function Q(id){return document.getElementById(id)}
function sv(){localStorage.setItem("fp-txns",JSON.stringify(S.txns));localStorage.setItem("fp-inv",JSON.stringify(S.inv));localStorage.setItem("fp-goals",JSON.stringify(S.goals))}
function toast(m){var t=Q("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2200)}
function kc(){Object.values(CH).forEach(function(c){try{c.destroy()}catch(e){}});CH={}}

Chart.defaults.color="#65657a";Chart.defaults.font.family="Inter";
var sM=Q("selM");
MO.forEach(function(m,i){var o=document.createElement("option");o.value=i;o.textContent=m;if(i===S.mo)o.selected=true;sM.appendChild(o)});
Q("selY").value=S.yr;

function onMC(){S.mo=+Q("selM").value;S.yr=+Q("selY").value;render()}
function go(t){S.tab=t;S.sf=false;S.eid=null;document.querySelectorAll(".tab,.mob-btn").forEach(function(b){b.classList.toggle("active",b.dataset.tab===t)});render()}

function gmt(m,y){return S.txns.filter(function(t){return t.month===(m!==undefined?m:S.mo)&&t.year===(y!==undefined?y:S.yr)})}
function gsum(txns,tp,md){return txns.filter(function(x){return x.type===tp&&(!md||x.mode===md)}).reduce(function(s,x){return s+x.amount},0)}
function ggrp(txns,tp,md){
  var m={};txns.filter(function(x){return x.type===tp&&(!md||x.mode===md)}).forEach(function(x){m[x.category]=(m[x.category]||0)+x.amount});
  return Object.entries(m).map(function(e){return{name:e[0],value:e[1]}}).sort(function(a,b){return b.value-a.value});
}
function gtrend(){
  var d=[];for(var i=5;i>=0;i--){var m=S.mo-i,y=S.yr;if(m<0){m+=12;y--}var t=gmt(m,y);d.push({l:MO[m].slice(0,3),i:gsum(t,"ingreso","real"),e:gsum(t,"egreso","real")})}return d;
}

function render(){kc();var c=Q("content");
  if(S.tab==="dash"){c.innerHTML=rD();iD()}
  else if(S.tab==="mov"){c.innerHTML=rM()}
  else if(S.tab==="ana"){c.innerHTML=rA();iA()}
  else if(S.tab==="inv"){c.innerHTML=rI();iI()}
  else if(S.tab==="met"){c.innerHTML=rG()}
}

function rD(){
  var t=gmt(),iR=gsum(t,"ingreso","real"),eR=gsum(t,"egreso","real"),bal=iR-eR;
  var iE=gsum(t,"ingreso","estimado"),eE=gsum(t,"egreso","estimado"),balE=iE-eE,hasE=iE>0||eE>0;
  var ti=S.inv.reduce(function(s,i){return s+i.amount},0);
  var tgt=S.goals.reduce(function(s,g){return s+g.target},0),tsv=S.goals.reduce(function(s,g){return s+g.saved},0);
  var pg=tgt>0?Math.round(tsv/tgt*100):0;
  var pie=ggrp(t,"egreso","real"),ipie=ggrp(t,"ingreso","real");
  var tr=gtrend(),ht=tr.some(function(d){return d.i>0||d.e>0});
  var sr=iR>0?Math.round((iR-eR)/iR*100):0;
  var balColor=bal>0?"var(--green)":bal<0?"var(--red)":"var(--text)";
  var srColor=sr>=0?"var(--green)":"var(--red)";

  var h='<div class="hero"><div class="hero-grid">';
  h+='<div><div class="label">Balance real de '+MO[S.mo]+' '+S.yr+'</div>';
  h+='<div class="amount" style="color:'+balColor+'">'+fmt(bal)+'</div>';
  if(hasE){
    var varColor=bal>=balE?"var(--green)":"var(--red)";
    var varArrow=bal>=balE?"▲":"▼";
    h+='<div class="hero-est"><span>Est: <b>'+fmt(balE)+'</b></span><span>Var: <b style="color:'+varColor+'">'+varArrow+' '+fmt(Math.abs(bal-balE))+'</b></span></div>';
  }
  h+='</div>';
  h+='<div class="hero-stat"><div class="label" style="color:var(--green)">▲ Ingresos</div><div class="val">'+fmt(iR)+'</div></div>';
  h+='<div class="hero-stat"><div class="label" style="color:var(--red)">▼ Egresos</div><div class="val">'+fmt(eR)+'</div></div>';
  h+='</div></div>';

  h+='<div class="g4">';
  h+='<div class="card mini" onclick="go(\'ana\')"><div class="mini-icon">💰</div><div class="mini-label">Ahorro</div><div class="mini-val" style="color:'+srColor+'">'+sr+'%</div></div>';
  h+='<div class="card mini" onclick="go(\'mov\')"><div class="mini-icon">📋</div><div class="mini-label">Movimientos</div><div class="mini-val">'+t.filter(function(x){return x.mode==="real"}).length+'</div></div>';
  h+='<div class="card mini" onclick="go(\'inv\')"><div class="mini-icon">📈</div><div class="mini-label">Invertido</div><div class="mini-val" style="color:var(--amber)">'+fmt(ti)+'</div></div>';
  h+='<div class="card mini" onclick="go(\'met\')"><div class="mini-icon">🎯</div><div class="mini-label">Metas</div><div class="mini-val" style="color:var(--lime)">'+pg+'%</div></div>';
  h+='</div>';

  h+='<div class="g3">';
  if(pie.length>0){
    h+='<div class="card"><div class="card-title">Desglose de gastos <span class="tag">'+pie.length+' cat</span></div>';
    h+='<div class="chart-sm"><canvas id="dP"></canvas></div><div style="margin-top:14px">';
    pie.slice(0,5).forEach(function(e,i){h+='<div class="leg-item"><span><span class="leg-dot" style="background:'+CL[i]+'"></span><span class="leg-name">'+e.name+'</span></span><span class="leg-val">'+fmt(e.value)+'</span></div>'});
    h+='</div></div>';
  } else h+='<div class="card empty"><div class="empty-icon">📊</div><div>Sin egresos</div></div>';

  if(ht){h+='<div class="card"><div class="card-title">Actividad financiera <span class="tag">6 meses</span></div><div class="chart-wrap"><canvas id="dT"></canvas></div></div>'}
  else h+='<div class="card empty"><div class="empty-icon">📈</div><div>Sin datos</div></div>';

  if(hasE){
    var cats={};t.forEach(function(x){if(x.type==="egreso")cats[x.category]=1});
    var ca=Object.keys(cats).slice(0,5);
    h+='<div class="card"><div class="card-title">Estimado vs Real</div>';
    h+='<div class="comp-legend"><span><span class="comp-dot" style="background:var(--border2)"></span>Estimado</span><span><span class="comp-dot" style="background:var(--lime)"></span>Real</span></div>';
    ca.forEach(function(cat){
      var est=t.filter(function(x){return x.type==="egreso"&&x.mode==="estimado"&&x.category===cat}).reduce(function(s,x){return s+x.amount},0);

      h+='<div class="prog-bg"><div class="prog-fill '+pCl+'" style="width:'+p+'%"></div></div>';
      h+='<div style="font-size:11px;color:var(--text3);margin-top:4px">Falta: '+fmt(rem)+'</div></div>';
      h+='<div class="goal-add"><input type="number" inputmode="numeric" class="input" placeholder="Sumar ahorro..." id="ga_'+g.id+'">';
      h+='<button class="btn btn-sm btn-lime" onclick="addG(\''+g.id+'\')">＋</button></div></div>';
    });
    h+='</div>';
  }
  return h;
}
function tgG(){S.sf=!S.sf;S.eid=null;S._fg={icon:"otro"};render()}
function edG(id){var g=S.goals.find(function(x){return x.id===id});if(!g)return;S._fg={name:g.name,target:g.target,saved:g.saved,icon:g.icon||"otro",deadline:g.deadline||"",notes:g.notes||""};S.eid=id;S.sf=true;render()}
function sgi(icon){
  S._fg=S._fg||{};S._fg.icon=icon;
  var gn=Q("gN"),gt=Q("gT"),gs=Q("gS"),gd=Q("gDl"),gno=Q("gNo");
  if(gn)S._fg.name=gn.value;if(gt)S._fg.target=gt.value;if(gs)S._fg.saved=gs.value;if(gd)S._fg.deadline=gd.value;if(gno)S._fg.notes=gno.value;
  render();
}
function subG(){
  var name=Q("gN").value,target=parseFloat(Q("gT").value),saved=parseFloat(Q("gS").value||0),deadline=Q("gDl").value,notes=Q("gNo").value;
  if(!name||!target)return toast("Completá nombre y monto");
  var e={name:name,target:target,saved:saved,icon:(S._fg||{}).icon||"otro",deadline:deadline,notes:notes,id:S.eid||Date.now().toString()};
  if(S.eid){S.goals=S.goals.map(function(g){return g.id===S.eid?e:g})}else{S.goals.push(e)}
  sv();S.sf=false;S.eid=null;toast("Meta "+(S.eid?"actualizada":"creada")+" ✓");render();
}
function dlG(id){if(!confirm("¿Eliminar?"))return;S.goals=S.goals.filter(function(g){return g.id!==id});sv();toast("Eliminada");render()}
function addG(id){
  var el=Q("ga_"+id);var amt=parseFloat(el?el.value:0);if(!amt)return;
  S.goals=S.goals.map(function(g){return g.id===id?Object.assign({},g,{saved:g.saved+amt}):g});
  sv();toast("Ahorro sumado ✓");render();
}

S.txns=S.txns.map(function(t){return t.mode?t:Object.assign({},t,{mode:"real"})});sv();
render();
</script>
